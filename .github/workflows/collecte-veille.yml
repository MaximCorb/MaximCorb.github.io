name: Collecte données veille

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer jq
        run: sudo apt-get install -y jq

      - name: Collecter les stats GitHub
        run: |
          mkdir -p data

          # ===== STRIPE =====
          TECHNO="stripe/stripe-node"
          CONCURRENT1="paypal/PayPal-PHP-SDK"
          CONCURRENT2="mollie/mollie-api-php"
          CONCURRENT3=""
          # ==================

          # Tech principale
          curl -s "https://api.github.com/repos/$TECHNO" \
            > data/techno-stats.json

          # Comparaison
          echo '[' > data/comparaison.json
          for REPO in $TECHNO $CONCURRENT1 $CONCURRENT2 $CONCURRENT3; do
            if [ -n "$REPO" ]; then
              STATS=$(curl -s "https://api.github.com/repos/$REPO")
              NOM=$(echo $STATS | jq -r '.name')
              STARS=$(echo $STATS | jq '.stargazers_count')
              FORKS=$(echo $STATS | jq '.forks_count')
              ISSUES=$(echo $STATS | jq '.open_issues_count')

              echo "{\"nom\":\"$NOM\",\"repo\":\"$REPO\",\"stars\":$STARS,\"forks\":$FORKS,\"issues\":$ISSUES}," >> data/comparaison.json
            fi
          done

          sed -i '$ s/,$//' data/comparaison.json
          echo ']' >> data/comparaison.json

          # Commits
          curl -s "https://api.github.com/repos/$TECHNO/stats/participation" \
            > data/commits.json

          # Release
          curl -s "https://api.github.com/repos/$TECHNO/releases/latest" \
            > data/release.json

      - name: Collecter les flux RSS
        run: |
          mkdir -p data/rss

          # ===== RSS STRIPE =====
          FLUX1="https://stripe.com/blog/feed.rss"
          FLUX2="https://docs.stripe.com/changelog/rss"
          FLUX3="https://www.reddit.com/r/stripe/.rss"
          # =======================

          INDEX=1
          for URL in $FLUX1 $FLUX2 $FLUX3; do
            curl -sL "$URL" -o "data/rss/flux-$INDEX.xml" || true
            INDEX=$((INDEX+1))
          done

          echo "{\"nb_flux\":$((INDEX-1))}" > data/rss/meta.json

      - name: Générer timestamp
        run: |
          echo "{\"derniere_maj\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Générer veille.json
        run: |
          jq -s '{
            techno: .[0],
            comparaison: .[1],
            commits: .[2],
            release: .[3],
            meta: .[4]
          }' \
          data/techno-stats.json \
          data/comparaison.json \
          data/commits.json \
          data/release.json \
          data/meta.json \
          > data/veille.json

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'actions@github.com'
          git add data/
          git diff --staged --quiet || git commit -m "Update veille data"
          git push
