name: Audit de sécurité hebdomadaire

on:
  schedule:
    - cron: '0 9 * * 1' # Chaque lundi à 09:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer les dépendances
        run: composer install --no-interaction --no-progress
        working-directory: ./site

      - name: Exécuter l’audit de sécurité
        id: audit
        run: |
          composer audit --format=json > audit.json || true
        working-directory: ./site

      - name: Créer une issue si des vulnérabilités sont détectées
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './site/audit.json';

            if (!fs.existsSync(path)) {
              console.log("Aucun fichier d'audit trouvé.");
              return;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            if (!data.advisories || Object.keys(data.advisories).length === 0) {
              console.log("Aucune vulnérabilité détectée.");
              return;
            }

            let body = "## Vulnérabilités de sécurité détectées\n\n";

            for (const pkg in data.advisories) {
              body += `### ${pkg}\n`;
              data.advisories[pkg].forEach(vuln => {
                body += `- Titre : ${vuln.title}\n`;
                body += `  - Gravité : ${vuln.severity}\n`;
                body += `  - Versions affectées : ${vuln.affected_versions}\n`;
                body += `  - Lien : ${vuln.link}\n\n`;
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Rapport hebdomadaire d’audit de sécurité",
              body: body
            });
